<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>IDY 2027 — T-Shirt Distribution</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:    #002D6E;
      --saffron: #FF9933;
      --green:   #138808;
      --bg:      #F4F6FB;
      --border:  #DDE2EE;
      --text:    #1A1A2E;
      --muted:   #6B7280;
      --ok:      #16A34A;
      --warn:    #D97706;
      --danger:  #DC2626;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans', 'Noto Sans Thai', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .tricolor { display: flex; height: 5px; }
    .tricolor div { flex: 1; }
    .tc-s { background: var(--saffron); }
    .tc-w { background: #fff; border-top: 1px solid #E8E0D0; border-bottom: 1px solid #E8E0D0; }
    .tc-g { background: var(--green); }
    header { background: var(--navy); padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; }
    .hdr-left { display: flex; align-items: center; gap: 10px; }
    .hdr-left h1 { color: #fff; font-size: 15px; font-weight: 700; }
    .hdr-left p  { color: rgba(255,255,255,.6); font-size: 11px; margin-top: 1px; }
    .badge { background: var(--saffron); color: #fff; font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 20px; }
    .screen { padding: 24px 18px; max-width: 480px; margin: 0 auto; }
    .hidden { display: none !important; }

    /* ── PIN ── */
    .pin-title { font-size: 20px; font-weight: 700; color: var(--navy); text-align: center; margin-bottom: 8px; }
    .pin-sub   { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 28px; }
    .pin-dots  { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--navy); background: #fff; transition: background .15s; }
    .dot.filled { background: var(--navy); }
    .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .key { height: 58px; border-radius: 12px; border: 1.5px solid var(--border); background: #fff; font-size: 22px; font-weight: 600; cursor: pointer; color: var(--text); }
    .key:active { background: #EEF2FF; }
    .key.del { font-size: 16px; }
    .pin-err { color: var(--danger); font-size: 13px; text-align: center; margin-top: 10px; }

    /* ── Setup ── */
    .setup-card { background: #fff; border-radius: 16px; padding: 22px; border: 1.5px solid var(--border); margin-bottom: 16px; }
    .setup-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 15px; font-family: inherit; outline: none; }
    .form-input:focus { border-color: var(--navy); }
    .btn { padding: 14px; border-radius: 12px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; width: 100%; margin-top: 14px; }
    .btn-navy   { background: var(--navy); color: #fff; }
    .btn-ok     { background: var(--ok); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-muted  { background: #F3F4F6; color: var(--muted); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn:active:not(:disabled) { opacity: .8; }

    /* ── Scan screen ── */
    .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--navy); color: #fff; padding: 10px 14px; border-radius: 12px; margin-bottom: 18px; font-size: 13px; }
    .end-btn { background: rgba(255,255,255,.15); border: none; color: #fff; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; font-weight: 600; }
    .scan-label { text-align: center; font-size: 16px; font-weight: 600; color: var(--navy); margin-bottom: 16px; }
    .manual-card { background: #fff; border-radius: 14px; padding: 18px; border: 1.5px solid var(--border); margin-top: 16px; }
    .manual-row  { display: flex; gap: 10px; }
    .manual-input { flex: 1; padding: 11px 14px; border-radius: 10px; border: 1.5px solid var(--border); font-size: 15px; font-family: inherit; outline: none; }
    .manual-input:focus { border-color: var(--navy); }
    .manual-btn { padding: 11px 18px; border-radius: 10px; background: var(--navy); color: #fff; border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }

    /* ── Result screens ── */
    .result-screen { padding: 22px; background: #fff; border-radius: 20px; border: 1.5px solid var(--border); text-align: center; }
    .result-icon  { font-size: 52px; margin-bottom: 12px; }
    .result-name  { font-size: 22px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
    .result-reg   { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .size-badge   { display: inline-block; background: var(--navy); color: #fff; font-size: 28px; font-weight: 800; padding: 12px 32px; border-radius: 14px; margin-bottom: 20px; letter-spacing: 2px; }
    .result-sub   { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
    .result-ok    { border-top: 6px solid var(--ok); }
    .result-warn  { border-top: 6px solid var(--warn); }
    .result-err   { border-top: 6px solid var(--danger); }
    .result-actions { display: flex; gap: 10px; }
    .result-actions .btn { margin-top: 0; }

    /* ── Toast ── */
    #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1E293B; color: #fff; padding: 10px 22px; border-radius: 30px; font-size: 14px; opacity: 0; pointer-events: none; transition: opacity .3s; z-index: 999; white-space: nowrap; }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="tricolor"><div class="tc-s"></div><div class="tc-w"></div><div class="tc-g"></div></div>
<header>
  <div class="hdr-left">
    <div>
      <h1>IDY 2027 · T-Shirt Desk</h1>
      <p>International Day of Yoga 2027 — Embassy of India, Bangkok</p>
    </div>
  </div>
  <span class="badge" id="hdrBadge">STAFF</span>
</header>
<div class="tricolor"><div class="tc-s"></div><div class="tc-w"></div><div class="tc-g"></div></div>

<!-- ════ SCREEN 1: PIN ════ -->
<div id="screenPin" class="screen">
  <div style="margin-top:40px;">
    <div class="pin-title">👕 T-Shirt Distribution</div>
    <div class="pin-sub">Enter staff PIN to begin</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="keypad">
      <button class="key" onclick="pinKey('1')">1</button>
      <button class="key" onclick="pinKey('2')">2</button>
      <button class="key" onclick="pinKey('3')">3</button>
      <button class="key" onclick="pinKey('4')">4</button>
      <button class="key" onclick="pinKey('5')">5</button>
      <button class="key" onclick="pinKey('6')">6</button>
      <button class="key" onclick="pinKey('7')">7</button>
      <button class="key" onclick="pinKey('8')">8</button>
      <button class="key" onclick="pinKey('9')">9</button>
      <button class="key del" onclick="pinKey('C')">⌫</button>
      <button class="key" onclick="pinKey('0')">0</button>
      <button class="key" onclick="pinKey('E')">↵</button>
    </div>
    <div class="pin-err hidden" id="pinErr">Incorrect PIN. Try again.</div>
  </div>
</div>

<!-- ════ SCREEN 2: SETUP ════ -->
<div id="screenSetup" class="screen hidden">
  <div class="setup-card">
    <div class="setup-title">T-Shirt Desk Setup</div>
    <label class="form-label">Volunteer Name</label>
    <input class="form-input" id="volName" placeholder="Your name" oninput="checkSetup()">
    <label class="form-label" style="margin-top:14px;">Desk Number</label>
    <div id="deskGrid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:6px;"></div>
  </div>
  <button class="btn btn-navy" id="btnBegin" onclick="beginSession()" disabled>Start Distributing →</button>
</div>

<!-- ════ SCREEN 3: SCAN ════ -->
<div id="screenScan" class="screen hidden">
  <div class="status-bar">
    <div id="sbInfo" style="font-weight:700;"></div>
    <button class="end-btn" onclick="endSession()">End Session</button>
  </div>
  <div class="scan-label">Scan participant QR code<br><span style="font-size:13px;opacity:.7">or use USB / Bluetooth handheld scanner</span></div>
  <div class="manual-card">
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-weight:600;">MANUAL ENTRY</div>
    <div class="manual-row">
      <input class="manual-input" id="manualInput" placeholder="Reg number e.g. 1001" type="number">
      <button class="manual-btn" onclick="manualLookup()">→</button>
    </div>
  </div>
</div>

<!-- ════ SCREEN 4: CONFIRM ISSUE ════ -->
<div id="screenConfirm" class="screen hidden">
  <div class="result-screen result-warn">
    <div class="result-icon">👕</div>
    <div class="result-name" id="confName"></div>
    <div class="result-reg"  id="confReg"></div>
    <div class="size-badge"  id="confSize"></div>
    <div class="result-sub"  id="confSub"></div>
    <div class="result-actions">
      <button class="btn btn-ok"    onclick="confirmIssue()">✅ Issue T-Shirt</button>
      <button class="btn btn-muted" onclick="cancelAction()">✕ Cancel</button>
    </div>
  </div>
</div>

<!-- ════ SCREEN 5: SUCCESS ════ -->
<div id="screenOk" class="screen hidden">
  <div class="result-screen result-ok">
    <div class="result-icon">✅</div>
    <div class="result-name" id="okName"></div>
    <div class="result-reg"  id="okReg"></div>
    <div class="size-badge"  id="okSize"></div>
    <div class="result-sub">T-shirt issued successfully</div>
    <button class="btn btn-navy" onclick="nextScan()">Scan Next →</button>
  </div>
</div>

<!-- ════ SCREEN 6: ERROR ════ -->
<div id="screenErr" class="screen hidden">
  <div class="result-screen result-err">
    <div class="result-icon" id="errIcon">⚠️</div>
    <div class="result-name" id="errTitle"></div>
    <div class="result-reg"  id="errSub"></div>
    <button class="btn btn-muted" style="margin-top:20px;" onclick="nextScan()">← Try Again</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
/* ═══════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════ */
const TSHIRT_PIN  = '2027';
const DESK_COUNT  = 5;   // number of T-shirt desks

const firebaseConfig = {
  apiKey:            "AIzaSyCJ31EusilYxaGWaorwYjqffVgV5crSecM",
  authDomain:        "idy2027-dba28.firebaseapp.com",
  databaseURL:       "https://idy2027-dba28-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "idy2027-dba28",
  storageBucket:     "idy2027-dba28.firebasestorage.app",
  messagingSenderId: "29018221908",
  appId:             "1:29018221908:web:9d2871f91ed3f441e82cc1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ═══════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════ */
let pinBuf        = '';
let volName       = '';
let selectedDesk  = '';
let pending       = null;   // participant awaiting issue confirmation
let sessionTimer  = null;
let warnTimer     = null;
const SESS_MS     = 30 * 60 * 1000;
const WARN_MS     = 28 * 60 * 1000;

const el  = id => document.getElementById(id);
const show = id => el(id).classList.remove('hidden');
const hide = id => el(id).classList.add('hidden');
function showOnly(id) {
  ['screenPin','screenSetup','screenScan','screenConfirm','screenOk','screenErr']
    .forEach(s => hide(s));
  show(id);
}

/* ═══════════════════════════════════════════════════════
   PIN
═══════════════════════════════════════════════════════ */
function updateDots() {
  for (let i = 0; i < 4; i++) {
    el('d' + i).classList.toggle('filled', i < pinBuf.length);
  }
}
function pinKey(k) {
  hide('pinErr');
  if (k === 'C') { pinBuf = pinBuf.slice(0, -1); updateDots(); return; }
  if (k === 'E' || pinBuf.length >= 4) { checkPin(); return; }
  if (pinBuf.length < 4) { pinBuf += k; updateDots(); }
  if (pinBuf.length === 4) checkPin();
}
function checkPin() {
  if (pinBuf === TSHIRT_PIN) { pinBuf = ''; updateDots(); buildDeskGrid(); showOnly('screenSetup'); }
  else { pinBuf = ''; updateDots(); show('pinErr'); }
}

/* ═══════════════════════════════════════════════════════
   SETUP
═══════════════════════════════════════════════════════ */
function buildDeskGrid() {
  const g = el('deskGrid'); g.innerHTML = '';
  for (let i = 1; i <= DESK_COUNT; i++) {
    const b = document.createElement('button');
    b.className = 'key'; b.style.cssText = 'height:46px;font-size:16px;border-radius:10px;';
    b.textContent = 'TS-' + i;
    b.onclick = () => {
      document.querySelectorAll('#deskGrid .key').forEach(x => x.style.background = '');
      b.style.background = '#E0E7FF'; b.style.borderColor = 'var(--navy)';
      selectedDesk = 'TS-' + i; checkSetup();
    };
    g.appendChild(b);
  }
}
function checkSetup() {
  el('btnBegin').disabled = !el('volName').value.trim() || !selectedDesk;
}
function beginSession() {
  volName = el('volName').value.trim();
  el('sbInfo').textContent = volName + ' · ' + selectedDesk;
  showOnly('screenScan');
  resetSessionTimer();
}

/* ═══════════════════════════════════════════════════════
   SESSION TIMEOUT
═══════════════════════════════════════════════════════ */
function resetSessionTimer() {
  clearTimeout(sessionTimer); clearTimeout(warnTimer);
  warnTimer = setTimeout(() => {
    if (volName) {
      const stay = confirm('⚠️ Session expires in 2 minutes.\n\nOK = Stay logged in');
      if (stay) resetSessionTimer();
    }
  }, WARN_MS);
  sessionTimer = setTimeout(() => {
    alert('Session timed out. Please log in again.');
    endSession(true);
  }, SESS_MS);
}
document.addEventListener('touchstart', () => { if (volName) resetSessionTimer(); });
document.addEventListener('click',      () => { if (volName) resetSessionTimer(); });

function endSession(auto = false) {
  clearTimeout(sessionTimer); clearTimeout(warnTimer);
  pending = null;
  showOnly('screenScan');
}

/* ═══════════════════════════════════════════════════════
   LOOKUP
═══════════════════════════════════════════════════════ */
async function lookup(raw) {
  const data = raw.trim();
  if (!data) return;

  // Accept raw reg number or QR JSON payload
  let regNum = data;
  try {
    const j = JSON.parse(data);
    if (j.regNum) regNum = String(j.regNum);
  } catch(_) {
    regNum = data.replace(/\D/g,'');
  }
  if (!regNum) return showErr('⚠️', 'Invalid QR Code', 'Could not read registration number');

  const snap = await db.ref('participants/' + regNum).once('value');
  const p = snap.val();

  if (!p) return showErr('❓', 'Not Found', 'Reg #' + regNum + ' not in system');
  if (p.tshirtIssued) return showErr('✅', 'T-Shirt Already Issued', p.name + ' (#' + regNum + ') — issued earlier');
  if (p.status === 'cancelled' || p.status === 'deleted') return showErr('🚫', 'Registration Cancelled', p.name + ' (#' + regNum + ')');

  pending = { regNum, ...p };
  el('confName').textContent = p.name;
  el('confReg').textContent  = 'Reg #' + regNum + ' · ' + (p.tshirtSize || '?');
  el('confSize').textContent = p.tshirtSize || '?';
  el('confSub').textContent  = p.status === 'checked_in' ? '✅ Checked in' : '⚠️ Not yet checked in';
  showOnly('screenConfirm');
}

function manualLookup() {
  const v = el('manualInput').value.trim();
  if (!v) return;
  el('manualInput').value = '';
  lookup(v);
}

/* ═══════════════════════════════════════════════════════
   ISSUE T-SHIRT
═══════════════════════════════════════════════════════ */
async function confirmIssue() {
  if (!pending) return;
  const p = pending; pending = null;

  await db.ref('participants/' + p.regNum).update({
    tshirtIssued: true,
    tshirtIssuedAt: Date.now(),
    tshirtDesk: selectedDesk,
    tshirtIssuedBy: volName
  });

  const today = new Date().toLocaleDateString('en-CA');
  db.ref('dashboard/summary/tshirtIssued').transaction(n => (n||0) + 1);
  db.ref(`dashboard/summary/sizes/${p.tshirtSize}/issued`).transaction(n => (n||0) + 1);
  db.ref(`dashboard/daily/${today}/tshirtIssued`).transaction(n => (n||0) + 1);
  db.ref('audit').push({ action:'TSHIRT_ISSUED', regNum: p.regNum, desk: selectedDesk, vol: volName, size: p.tshirtSize, ts: Date.now() });

  el('okName').textContent = p.name;
  el('okReg').textContent  = 'Reg #' + p.regNum;
  el('okSize').textContent = p.tshirtSize || '?';
  showOnly('screenOk');
}

function cancelAction() { pending = null; nextScan(); }
function nextScan() { showOnly('screenScan'); }

function showErr(icon, title, sub) {
  el('errIcon').textContent  = icon;
  el('errTitle').textContent = title;
  el('errSub').textContent   = sub;
  showOnly('screenErr');
}

/* ═══════════════════════════════════════════════════════
   USB / BLUETOOTH HANDHELD SCANNER SUPPORT
   Scanners behave like a keyboard — rapid keystrokes → Enter
═══════════════════════════════════════════════════════ */
(function initUsbScanner() {
  let buf = '', timer = null;
  document.addEventListener('keydown', e => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    if (e.key === 'Enter') {
      clearTimeout(timer);
      const data = buf.trim(); buf = '';
      if (data.length < 2) return;
      const onScan = !el('screenScan').classList.contains('hidden');
      if (!onScan) return;
      lookup(data);
      return;
    }
    if (e.key.length === 1) {
      buf += e.key;
      clearTimeout(timer);
      timer = setTimeout(() => { buf = ''; }, 500);
    }
  });
})();

// No PIN, no setup — go straight to scan
volName      = 'Staff';
selectedDesk = 'TS-1';
showOnly('screenScan');
resetSessionTimer();
</script>
</body>
</html>
